<svg
    width="512"
    height="512"
    viewBox="0 0 512 512"
    fill="none"
    xmlns="http://www.w3.org/2000/svg">

    <defs>
        <!-- Background -->
        <linearGradient id="bgGradient" x1="70" y1="40" x2="440" y2="480" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#85528C"/>
            <stop offset="0.45" stop-color="#654075"/>
            <stop offset="1" stop-color="#302348"/>
        </linearGradient>

        <!-- Main paper -->
        <linearGradient id="paperGradient" x1="180" y1="80" x2="360" y2="420" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#FFFFFF"/>
            <stop offset="1" stop-color="#F0ECF7"/>
        </linearGradient>

        <!-- Appendix paper -->
        <linearGradient id="appendixGradient" x1="330" y1="240" x2="450" y2="450" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#FFF9F0"/>
            <stop offset="1" stop-color="#F0E4D8"/>
        </linearGradient>

        <!-- Purple accent -->
        <linearGradient id="purpleGradient" x1="130" y1="160" x2="400" y2="420" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#8253B1"/>
            <stop offset="1" stop-color="#40215F"/>
        </linearGradient>

        <!-- Shadows -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
            <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#120B1E" flood-opacity="0.34"/>
        </filter>

        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
            <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#22152F" flood-opacity="0.2"/>
        </filter>

        <clipPath id="appIconClip">
            <rect x="20" y="20" width="472" height="472" rx="104"/>
        </clipPath>
    </defs>

    <!-- App icon background -->
    <g clip-path="url(#appIconClip)">
        <rect x="20" y="20" width="472" height="472" rx="104" fill="url(#bgGradient)"/>

        <!-- Subtle decorative glow -->
        <circle cx="120" cy="100" r="140" fill="#B580BA" opacity="0.10"/>
        <circle cx="430" cy="430" r="180" fill="#160E27" opacity="0.14"/>
    </g>

    <!-- Back document -->
    <g filter="url(#softShadow)">
        <path
            d="M124 119
               C124 104 136 92 151 92
               H314
               L370 146
               V416
               C370 431 358 443 343 443
               H151
               C136 443 124 431 124 416
               Z"
            fill="#C9B7E6"
            stroke="#E9DFFF"
            stroke-width="3"/>
    </g>

    <!-- Main contract document -->
    <g filter="url(#shadow)">
        <path
            d="M148 78
               C148 62 161 49 177 49
               H329
               L403 124
               V402
               C403 418 390 431 374 431
               H177
               C161 431 148 418 148 402
               Z"
            fill="url(#paperGradient)"/>

        <!-- Folded corner -->
        <path
            d="M329 49
               L403 124
               H358
               C342 124 329 111 329 95
               Z"
            fill="#FBFAFD"/>

        <path
            d="M329 49
               L403 124
               H358
               C342 124 329 111 329 95
               Z"
            stroke="#D9D1E3"
            stroke-width="2"/>

        <!-- Title -->
        <text
            x="276"
            y="154"
            text-anchor="middle"
            font-family="Arial, Helvetica, sans-serif"
            font-size="35"
            font-weight="700"
            fill="#3B225C">
            HỢP ĐỒNG
        </text>

        <!-- Document text lines -->
        <rect x="195" y="189" width="160" height="8" rx="4" fill="#C8BDD8"/>
        <rect x="195" y="216" width="160" height="8" rx="4" fill="#C8BDD8"/>
        <rect x="195" y="243" width="128" height="8" rx="4" fill="#C8BDD8"/>
        <rect x="195" y="270" width="102" height="8" rx="4" fill="#C8BDD8"/>

        <!-- Handshake badge -->
        <circle cx="228" cy="333" r="47" fill="#EFE8FA" stroke="url(#purpleGradient)" stroke-width="7"/>

        <!-- Handshake icon -->
        <path
            d="M194 318
               L210 302
               L226 310
               L239 303
               L265 324
               L252 337
               L235 323
               L228 329
               C223 334 215 334 210 329
               L201 321
               Z"
            fill="url(#purpleGradient)"/>

        <path
            d="M206 335
               L217 346
               M217 331
               L230 344
               M229 329
               L242 341"
            stroke="#5C357B"
            stroke-width="6"
            stroke-linecap="round"/>

        <!-- Signature -->
        <path
            d="M273 377
               C289 356 302 349 306 360
               C309 369 290 381 281 387
               C306 373 322 367 326 375
               C329 382 315 388 310 392
               C326 384 337 383 342 390
               C346 395 354 393 362 389"
            stroke="#38204F"
            stroke-width="5"
            stroke-linecap="round"
            stroke-linejoin="round"/>

        <rect x="286" y="405" width="76" height="5" rx="2.5" fill="#C4B5D8"/>
    </g>

    <!-- Appendix document -->
    <g filter="url(#shadow)">
        <path
            d="M305 240
               C305 225 317 213 332 213
               H423
               C438 213 450 225 450 240
               V420
               C450 435 438 447 423 447
               H332
               C317 447 305 435 305 420
               Z"
            fill="url(#appendixGradient)"/>

        <!-- Paper clip -->
        <path
            d="M386 239
               V202
               C386 188 396 178 409 178
               C422 178 432 188 432 202
               V252
               C432 269 420 281 405 281
               C390 281 378 269 378 254
               V216"
            stroke="url(#purpleGradient)"
            stroke-width="10"
            stroke-linecap="round"/>

        <path
            d="M386 239
               V202
               C386 188 396 178 409 178
               C422 178 432 188 432 202
               V252"
            stroke="#A77CD5"
            stroke-width="3"
            stroke-linecap="round"
            opacity="0.65"/>

        <!-- Appendix title -->
        <text
            x="377"
            y="318"
            text-anchor="middle"
            font-family="Arial, Helvetica, sans-serif"
            font-size="25"
            font-weight="700"
            fill="#3B225C">
            PHỤ LỤC
        </text>

        <!-- Appendix lines -->
        <rect x="331" y="342" width="94" height="7" rx="3.5" fill="#BAABBF"/>
        <rect x="331" y="362" width="60" height="7" rx="3.5" fill="#BAABBF"/>

        <!-- Table -->
        <rect x="332" y="385" width="94" height="50" rx="5" stroke="#AF9AB5" stroke-width="3"/>
        <path d="M363 385V435" stroke="#AF9AB5" stroke-width="3"/>
        <path d="M395 385V435" stroke="#AF9AB5" stroke-width="3"/>
        <path d="M332 410H426" stroke="#AF9AB5" stroke-width="3"/>

        <!-- Folded corner -->
        <path
            d="M410 447
               L450 407
               V420
               C450 435 438 447 423 447
               Z"
            fill="#FFFDF9"/>
    </g>

    <!-- Outer border highlight -->
    <rect
        x="20"
        y="20"
        width="472"
        height="472"
        rx="104"
        stroke="#FFFFFF"
        stroke-opacity="0.18"
        stroke-width="3"/>
</svg>