<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140" viewBox="0 0 140 140">
  <!-- Background -->
  <rect width="140" height="140" rx="28" fill="#0B6EE4"/>
  <rect x="0" y="0" width="140" height="70" rx="28" fill="#1A7FFF" opacity="0.35"/>

  <!-- Invoice document -->
  <rect x="22" y="18" width="68" height="84" rx="7" fill="#fff" opacity="0.12"/>
  <rect x="26" y="22" width="60" height="76" rx="6" fill="#fff"/>

  <!-- Document lines -->
  <rect x="34" y="34" width="44" height="5" rx="2.5" fill="#0B6EE4" opacity="0.35"/>
  <rect x="34" y="45" width="34" height="3.5" rx="1.75" fill="#0B6EE4" opacity="0.2"/>
  <rect x="34" y="53" width="38" height="3.5" rx="1.75" fill="#0B6EE4" opacity="0.2"/>
  <rect x="34" y="61" width="28" height="3.5" rx="1.75" fill="#0B6EE4" opacity="0.2"/>
  <line x1="34" y1="71" x2="78" y2="71" stroke="#0B6EE4" stroke-width="0.8" opacity="0.2"/>
  <rect x="34" y="77" width="18" height="3.5" rx="1.75" fill="#0B6EE4" opacity="0.18"/>
  <rect x="58" y="77" width="20" height="3.5" rx="1.75" fill="#0B6EE4" opacity="0.6"/>

  <!-- Arc line to MISA node -->
  <path d="M88 60 Q112 48 118 34" stroke="#38BDF8" stroke-width="2"
        fill="none" opacity="0.85" stroke-dasharray="4,3"/>

  <!-- MISA cloud node -->
  <circle cx="118" cy="30" r="14" fill="#38BDF8"/>
  <text x="118" y="34" font-family="sans-serif" font-size="8"
        font-weight="700" fill="#003A8C" text-anchor="middle">MISA</text>

  <!-- Success check badge -->
  <circle cx="100" cy="106" r="16" fill="#16A34A"/>
  <path d="M93 106 L98 111 L108 101"
        stroke="#fff" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>